<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Manager — Purrfect Pear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Lora:wght@700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <span class="logo">Purrfect Pear</span>
        <ul>
          <li><a href="index.html">&larr; Back to Site</a></li>
          <li><button class="btn-logout" id="logout-btn" type="button">Log Out</button></li>
        </ul>
      </nav>
    </header>

    <main style="visibility: hidden;">
      <section class="section">
        <h2>Cat Manager</h2>

        <form id="cat-form" class="cat-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="cat-name">Name</label>
              <input type="text" id="cat-name" placeholder="e.g. Bartlett" required />
            </div>
            <div class="form-group">
              <label for="cat-breed">Breed</label>
              <input type="text" id="cat-breed" placeholder="e.g. Tabby" required />
            </div>
            <div class="form-group">
              <label for="cat-age">Age</label>
              <input type="number" id="cat-age" min="0" max="25" placeholder="e.g. 3" required />
            </div>
          </div>
          <div class="form-group">
            <label for="cat-personality">Personality</label>
            <textarea id="cat-personality" rows="2" placeholder="Describe this cat's personality..."></textarea>
          </div>
          <div class="form-group">
            <label for="cat-photo">Photo URL <span class="optional">(optional)</span></label>
            <input type="url" id="cat-photo" placeholder="https://example.com/cat.jpg" />
          </div>
          <div class="form-group form-group--inline">
            <input type="checkbox" id="cat-adopted" />
            <label for="cat-adopted">Mark as adopted</label>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" id="cat-submit">Add Cat</button>
            <button type="button" class="btn-secondary" id="cat-cancel" hidden>Cancel Edit</button>
          </div>
          <p class="form-error" id="cat-error" hidden></p>
        </form>

        <div id="cat-list" class="cat-admin-grid"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Purrfect Pear Cat Cafe. All rights reserved.</p>
    </footer>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>

    <script src="js/storage.js"></script>
    <script src="js/cats.js"></script>
    <script src="js/cats-ui.js"></script>
    <script src="js/admin-auth.js"></script>
  </body>
</html>
