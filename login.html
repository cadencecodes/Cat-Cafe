<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Login — Purrfect Pear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Lora:wght@700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(
          155deg,
          var(--forest)     0%,
          var(--green-dark) 45%,
          var(--green-mid)  100%
        );
      }

      .login-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.25rem;
      }

      .login-card {
        background: var(--cream);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        padding: 2.75rem 2.5rem;
        width: 100%;
        max-width: 420px;
      }

      .login-logo {
        font-family: 'Fraunces', serif;
        font-size: 1.35rem;
        font-weight: 900;
        color: var(--green-dark);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-align: center;
        margin-bottom: 0.25rem;
      }

      .login-subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.88rem;
        margin-bottom: 2rem;
      }

      .auth-tabs {
        display: flex;
        border: 2px solid var(--sage-light);
        border-radius: var(--radius-pill);
        overflow: hidden;
        margin-bottom: 1.75rem;
      }

      .auth-tab {
        flex: 1;
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.92rem;
        font-weight: 700;
        padding: 0.55rem 1rem;
        color: var(--text-muted);
        transition: background-color 0.2s, color 0.2s;
      }

      .auth-tab.active {
        background-color: var(--green-dark);
        color: var(--pear);
      }

      .login-form .form-group {
        margin-bottom: 1rem;
      }

      .login-form .form-group label {
        font-size: 0.88rem;
        font-weight: 700;
        color: var(--green-dark);
        margin-bottom: 0.38rem;
        letter-spacing: 0.02em;
        display: block;
      }

      .login-form .form-group input {
        background: var(--cream-warm);
        border: 2px solid var(--sage-light);
        border-radius: var(--radius-sm);
        color: var(--text-dark);
        font-family: inherit;
        font-size: 0.97rem;
        padding: 0.62rem 0.95rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        width: 100%;
      }

      .login-form .form-group input:focus {
        border-color: var(--green-mid);
        box-shadow: 0 0 0 3px rgba(53, 107, 40, 0.12);
        outline: none;
      }

      .login-error {
        background: #fdecea;
        border: 1.5px solid var(--danger);
        border-radius: var(--radius-sm);
        color: var(--danger);
        font-size: 0.88rem;
        font-weight: 700;
        margin-bottom: 1rem;
        padding: 0.6rem 0.9rem;
        display: none;
      }

      .login-error.visible {
        display: block;
      }

      .btn-login {
        background-color: var(--green-dark);
        border: none;
        border-radius: var(--radius-pill);
        color: var(--pear);
        cursor: pointer;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 700;
        padding: 0.78rem 1.85rem;
        transition: background-color 0.2s, transform 0.15s, box-shadow 0.2s;
        box-shadow: var(--shadow-sm);
        width: 100%;
        margin-top: 0.5rem;
        letter-spacing: 0.01em;
      }

      .btn-login:hover:not(:disabled) {
        background-color: var(--green-mid);
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }

      .btn-login:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .login-back {
        display: block;
        text-align: center;
        margin-top: 1.5rem;
        color: var(--text-muted);
        font-size: 0.85rem;
        text-decoration: none;
        transition: color 0.2s;
      }

      .login-back:hover {
        color: var(--green-dark);
      }

      @media (max-width: 480px) {
        .login-card {
          padding: 2rem 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper" style="visibility: hidden;">
      <div class="login-card">
        <p class="login-logo">Purrfect Pear</p>
        <p class="login-subtitle">Staff Portal</p>

        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" type="button">Log In</button>
          <button class="auth-tab" id="tab-signup" type="button">Sign Up</button>
        </div>

        <form class="login-form" id="auth-form" novalidate>
          <div class="form-group">
            <label for="auth-email">Email</label>
            <input type="email" id="auth-email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="auth-password">Password</label>
            <input type="password" id="auth-password" placeholder="••••••••" required autocomplete="current-password" minlength="6" />
          </div>

          <p class="login-error" id="auth-error" role="alert"></p>

          <button type="submit" class="btn-login" id="auth-submit">Log In</button>
        </form>

        <a href="index.html" class="login-back">&larr; Back to site</a>
      </div>
    </div>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
